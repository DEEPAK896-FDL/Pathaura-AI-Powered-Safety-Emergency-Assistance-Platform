<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pathaura</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #0f172a; color: #f8fafc; }
    .container { max-width: 900px; margin: 0 auto; padding: 3rem 1.5rem; }
    .card { background: #111827; border: 1px solid #334155; border-radius: 16px; padding: 2rem; box-shadow: 0 10px 30px rgba(0,0,0,.25); }
    h1 { margin-top: 0; }
    code { background: #1f2937; padding: 0.2rem 0.4rem; border-radius: 6px; }
    a { color: #38bdf8; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Pathaura is running</h1>
      <p>The backend and API are available at <code>/api</code>.</p>
      <p>Try the registration endpoint:</p>
      <code>POST /api/auth/register</code>
      <p>Or open the API docs via the server root and inspect the available routes.</p>
    </div>
  </div>
</body>
</html>
